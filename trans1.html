<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Translator</title>
    <style>
        :root { --blue: #1a73e8; --green: #34a853; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #000; color: white; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .top-bar { height: 12%; background: #202124; display: flex; align-items: center; justify-content: space-around; padding: 0 10px; }
        select { background: #3c4043; color: white; border: 1px solid #5f6368; padding: 10px; border-radius: 8px; width: 45%; font-weight: bold; }
        .zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; user-select: none; }
        #zone1 { background: var(--blue); }
        #zone2 { background: var(--green); }
        .zone:active { filter: brightness(1.2); }
        .status { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .result { font-size: 1.2rem; padding: 0 20px; text-align: center; min-height: 1.5em; opacity: 0.9; }
        .recording { animation: pulse 1s infinite; color: #ff5252; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <select id="lang1">
            <option value="Hebrew" data-code="he-IL" selected>עברית</option>
            <option value="English" data-code="en-US">English</option>
        </select>
        <select id="lang2">
            <option value="English" data-code="en-US" selected>English</option>
            <option value="Hebrew" data-code="he-IL">עברית</option>
        </select>
    </div>

    <div class="zone" id="zone1" onmousedown="start(1)" onmouseup="stop(1)" ontouchstart="start(1)" ontouchend="stop(1)">
        <div class="status" id="status1">לחץ והחזק</div>
        <div class="result" id="result1"></div>
    </div>

    <div class="zone" id="zone2" onmousedown="start(2)" onmouseup="stop(2)" ontouchstart="start(2)" ontouchend="stop(2)">
        <div class="status" id="status2">Press & Hold</div>
        <div class="result" id="result2"></div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyBqFLlX7y-T4KZsQqn4nr8pmWyFIT7iiRc";

    // מודל Gemini 2.5 Flash
    const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2-flash:generateContent?key=${API_KEY}`;

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    let isActive = false;

    function start(z) {
        if (isActive) return;
        isActive = true;

        const sel = document.getElementById(`lang${z}`);
        recognition.lang = sel.options[sel.selectedIndex].dataset.code;

        document.getElementById(`status${z}`).classList.add('recording');
        recognition.start();

        recognition.onresult = (e) => {
            const text = e.results[0][0].transcript;
            document.getElementById(`result${z}`).innerText = text;
            translate(text, z);
        };
    }

    function stop(z) {
        if (!isActive) return;
        isActive = false;
        document.getElementById(`status${z}`).classList.remove('recording');
        setTimeout(() => recognition.stop(), 300);
    }

    async function translate(text, z) {
        const targetId = (z === 1) ? 'result2' : 'result1';

        const from = (z === 1) ? document.getElementById('lang1').value : document.getElementById('lang2').value;
        const to   = (z === 1) ? document.getElementById('lang2').value : document.getElementById('lang1').value;

        const tCode = document.getElementById(z === 1 ? 'lang2' : 'lang1').selectedOptions[0].dataset.code;

        const prompt = `
Translate the following text from ${from} to ${to}.
Provide a natural, idiomatic translation that reflects the intended meaning, not a literal translation.
If the text contains slang, idioms, or figurative expressions, translate them to their closest natural equivalent.
Text: "${text}"
Only output the translation itself.
        `;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content) {
                const output = data.candidates[0].content.parts[0].text.trim();
                document.getElementById(targetId).innerText = output;

                const speech = new SpeechSynthesisUtterance(output);
                speech.lang = tCode;
                window.speechSynthesis.speak(speech);
            } else {
                document.getElementById(targetId).innerText = "API Error";
                console.log(data);
            }
        } catch (err) {
            document.getElementById(targetId).innerText = "Network Error";
        }
    }
</script>

</body>
</html>
