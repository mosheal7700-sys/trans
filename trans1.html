<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Translator</title>
    <style>
        :root { --blue: #1a73e8; --green: #34a853; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; background: #000; color: white; overflow: hidden; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .top-bar { height: 12%; background: #202124; display: flex; align-items: center; justify-content: space-around; padding: 0 10px; }
        select { background: #3c4043; color: white; border: 1px solid #5f6368; padding: 10px; border-radius: 8px; width: 45%; font-weight: bold; }
        .zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; cursor: pointer; user-select: none; }
        #zone1 { background: var(--blue); }
        #zone2 { background: var(--green); }
        .zone:active { filter: brightness(1.2); }
        .status { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .result { font-size: 1.2rem; padding: 0 20px; text-align: center; min-height: 1.5em; opacity: 0.9; }
        .recording { animation: pulse 1s infinite; color: #ff5252; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">

        <!-- שפה 1 — עברית / אנגלית בלבד -->
        <select id="lang1" onchange="updateButtons()">
            <option value="Hebrew" data-code="he-IL" selected>עברית (Hebrew)</option>
            <option value="English" data-code="en-US">אנגלית (English)</option>
        </select>

        <!-- שפה 2 — רשימת שפות מלאה עם שמות בעברית -->
        <select id="lang2" onchange="updateButtons()">
            <option value="English" data-code="en-US" selected>אנגלית (English)</option>
            <option value="Hebrew" data-code="he-IL">עברית (Hebrew)</option>
            <option value="Arabic" data-code="ar-SA">ערבית (Arabic)</option>
            <option value="French" data-code="fr-FR">צרפתית (Français)</option>
            <option value="Spanish" data-code="es-ES">ספרדית (Español)</option>
            <option value="Russian" data-code="ru-RU">רוסית (Русский)</option>
            <option value="Chinese" data-code="zh-CN">סינית (中文)</option>
            <option value="Japanese" data-code="ja-JP">יפנית (日本語)</option>
            <option value="Korean" data-code="ko-KR">קוריאנית (한국어)</option>
            <option value="German" data-code="de-DE">גרמנית (Deutsch)</option>
            <option value="Italian" data-code="it-IT">איטלקית (Italiano)</option>
            <option value="Portuguese" data-code="pt-PT">פורטוגזית (Português)</option>
            <option value="Hindi" data-code="hi-IN">הינדי (हिन्दी)</option>
        </select>

    </div>

    <div class="zone" id="zone1" onmousedown="start(1)" onmouseup="stop(1)" ontouchstart="start(1)" ontouchend="stop(1)">
        <div class="status" id="status1">עברית (Hebrew)</div>
        <div class="result" id="result1"></div>
    </div>

    <div class="zone" id="zone2" onmousedown="start(2)" onmouseup="stop(2)" ontouchstart="start(2)" ontouchend="stop(2)">
        <div class="status" id="status2">אנגלית (English)</div>
        <div class="result" id="result2"></div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyAkIt20x2A_cqLf0R19rkRiJn1IKsYfjnw";
    const API_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    let isActive = false;

    let lastCall = 0;
    const MIN_DELAY = 1200;

    function updateButtons() {
        const lang1Text = document.getElementById("lang1").selectedOptions[0].text;
        const lang2Text = document.getElementById("lang2").selectedOptions[0].text;

        document.getElementById("status1").innerText = lang1Text;
        document.getElementById("status2").innerText = lang2Text;
    }

    updateButtons();

    function start(z) {
        if (isActive) return;
        isActive = true;

        const sel = document.getElementById(`lang${z}`);
        recognition.lang = sel.options[sel.selectedIndex].dataset.code;

        document.getElementById(`status${z}`).classList.add('recording');
        recognition.start();

        recognition.onresult = (e) => {
            const text = e.results[0][0].transcript;
            document.getElementById(`result${z}`).innerText = text;
            translate(text, z);
        };
    }

    function stop(z) {
        if (!isActive) return;
        isActive = false;
        document.getElementById(`status${z}`).classList.remove('recording');
        setTimeout(() => recognition.stop(), 300);
    }

    async function translate(text, z) {
        const now = Date.now();
        if (now - lastCall < MIN_DELAY) return;
        lastCall = now;

        const targetId = (z === 1) ? 'result2' : 'result1';

        const fromLang = document.getElementById(z === 1 ? 'lang1' : 'lang2').value;
        const toLang   = document.getElementById(z === 1 ? 'lang2' : 'lang1').value;

        const tCode = document.getElementById(z === 1 ? 'lang2' : 'lang1')
                        .selectedOptions[0].dataset.code;

        const prompt = `
You are a professional translator.
Translate from ${fromLang} to ${toLang}.
Translate meaning, tone, and intent — not words.
Use natural, native phrasing.
Output only the translation.

${text}
        `;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }]
                })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content) {
                const output = data.candidates[0].content.parts[0].text.trim();
                document.getElementById(targetId).innerText = output;

                const speech = new SpeechSynthesisUtterance(output);
                speech.lang = tCode;
                window.speechSynthesis.speak(speech);
            } else {
                document.getElementById(targetId).innerText = "API Error";
            }
        } catch (err) {
            document.getElementById(targetId).innerText = "Network Error";
        }
    }
</script>

</body>
</html>
