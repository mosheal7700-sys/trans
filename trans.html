<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתרגם קולי צבעוני</title>
    <style>
        :root {
            --zone1-color: #4A90E2; /* כחול */
            --zone2-color: #F5A623; /* כתום/צהוב */
            --bg-light: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* שורה עליונה - בחירת שפות */
        .top-bar {
            display: flex;
            height: 12%;
            background: #2c3e50;
            padding: 5px;
            gap: 5px;
            z-index: 10;
        }

        .lang-select-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        select {
            width: 95%;
            padding: 10px;
            border-radius: 12px;
            border: none;
            font-size: 1rem;
            background: #ecf0f1;
            font-weight: bold;
        }

        /* אזורי הלחיצה */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .translate-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.2s, transform 0.1s;
            -webkit-user-select: none;
            user-select: none;
            cursor: pointer;
            text-shadow: 0px 1px 3px rgba(0,0,0,0.3);
        }

        #zone1 { background-color: var(--zone1-color); }
        #zone2 { background-color: var(--zone2-color); }

        /* אפקט בזמן לחיצה */
        .translate-zone:active {
            opacity: 0.8;
            transform: scale(0.98);
        }

        .lang-display-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 12px;
            border-radius: 20px;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .status-text {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .result-text {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
            padding: 0 30px;
            margin-top: 10px;
            max-height: 3.6em;
            overflow: hidden;
        }

        .mic-icon {
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="lang-select-box">
            <select id="lang1" onchange="updateLabels()">
                <option value="he-IL" selected>עברית</option>
                <option value="en-US">אנגלית</option>
                <option value="es-ES">ספרדית</option>
                <option value="fr-FR">צרפתית</option>
                <option value="ru-RU">רוסית</option>
                <option value="ar-SA">ערבית</option>
            </select>
        </div>
        <div class="lang-select-box">
            <select id="lang2" onchange="updateLabels()">
                <option value="en-US" selected>אנגלית</option>
                <option value="he-IL">עברית</option>
                <option value="es-ES">ספרדית</option>
                <option value="fr-FR">צרפתית</option>
                <option value="ru-RU">רוסית</option>
                <option value="ar-SA">ערבית</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div id="zone1" class="translate-zone" 
             onmousedown="startRecording(1)" onmouseup="stopRecording(1)" 
             ontouchstart="startRecording(1)" ontouchend="stopRecording(1)">
            <div class="lang-display-label" id="label1">עברית</div>
            <div class="mic-icon">🎤</div>
            <div class="status-text" id="status1">לחץ להקלטה</div>
            <div class="result-text" id="result1">...</div>
        </div>

        <div id="zone2" class="translate-zone" 
             onmousedown="startRecording(2)" onmouseup="stopRecording(2)" 
             ontouchstart="startRecording(2)" ontouchend="stopRecording(2)">
            <div class="lang-display-label" id="label2">אנגלית</div>
            <div class="mic-icon">🎤</div>
            <div class="status-text" id="status2">לחץ להקלטה</div>
            <div class="result-text" id="result2">...</div>
        </div>
    </div>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isRecording = false;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
    }

    // עדכון תוויות השפה המוצגות בכפתורים
    function updateLabels() {
        const s1 = document.getElementById('lang1');
        const s2 = document.getElementById('lang2');
        
        document.getElementById('label1').innerText = s1.options[s1.selectedIndex].text;
        document.getElementById('label2').innerText = s2.options[s2.selectedIndex].text;
    }

    function startRecording(zoneNum) {
        if (isRecording || !recognition) return;
        isRecording = true;

        const langSource = document.getElementById(zoneNum === 1 ? 'lang1' : 'lang2').value;
        recognition.lang = langSource;

        document.getElementById(`status${zoneNum}`).innerText = "מקשיב...";
        recognition.start();

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById(`result${zoneNum}`).innerText = transcript;
            processTranslation(transcript, zoneNum);
        };

        recognition.onerror = () => stopRecording(zoneNum);
    }

    function stopRecording(zoneNum) {
        if (!isRecording) return;
        isRecording = false;
        document.getElementById(`status${zoneNum}`).innerText = "לחץ להקלטה";
        setTimeout(() => recognition.stop(), 400);
    }

    async function processTranslation(text, fromZone) {
        const lang1 = document.getElementById('lang1').value;
        const lang2 = document.getElementById('lang2').value;

        const sourceLang = (fromZone === 1) ? lang1 : lang2;
        const targetLang = (fromZone === 1) ? lang2 : lang1;
        const targetResultId = (fromZone === 1) ? 'result2' : 'result1';

        try {
            // תרגום באמצעות MyMemory API
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang.split('-')[0]}|${targetLang.split('-')[0]}`);
            const data = await res.json();
            const translatedText = data.responseData.translatedText;

            document.getElementById(targetResultId).innerText = translatedText;
            speak(translatedText, targetLang);
        } catch (e) {
            console.error("Translation error", e);
        }
    }

    function speak(text, langCode) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = langCode;
        window.speechSynthesis.speak(utterance);
    }

    // הפעלה ראשונית של התוויות
    updateLabels();
</script>

</body>
</html>
