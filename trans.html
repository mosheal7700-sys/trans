<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מכשיר קשר מתרגם</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: Arial; overflow: hidden; background: #000; user-select: none; -webkit-user-select: none; }
        .container { display: flex; flex-direction: column; height: 100vh; }
        .btn { 
            flex: 1; border: 5px solid #222; color: white; font-size: 2.5rem; font-weight: bold; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; 
            text-align: center; -webkit-tap-highlight-color: transparent;
            transition: background 0.1s;
        }
        #btn-en { background-color: #D32F2F; } /* אדום כהה */
        #btn-he { background-color: #1976D2; } /* כחול כהה */
        
        /* עיצוב בזמן לחיצה */
        .btn.active { background-color: #FFD700 !important; color: black; border: 10px solid white; }
        
        #log { 
            position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.9); 
            color: #0f0; font-size: 1.2rem; height: 80px; padding: 15px; 
            box-sizing: border-box; text-align: center; pointer-events: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="btn-en" class="btn" 
         onmousedown="startHold('en-US', 'en', 'he')" 
         onmouseup="endHold()" 
         ontouchstart="startHold('en-US', 'en', 'he')" 
         ontouchend="endHold()">ENGLISH<br>(Hold to speak)</div>

    <div id="btn-he" class="btn" 
         onmousedown="startHold('he-IL', 'he', 'en')" 
         onmouseup="endHold()" 
         ontouchstart="startHold('he-IL', 'he', 'en')" 
         ontouchend="endHold()">עברית<br>(לחץ והחזק)</div>
</div>

<div id="log">מוכן. החזק כפתור כדי לדבר.</div>

<script>
    const logDiv = document.getElementById('log');
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    const synth = window.speechSynthesis;

    recognition.interimResults = false;
    recognition.continuous = true; // מאפשר להמשיך להקשיב עד שאנחנו עוצרים ידנית

    let curFrom, curTo, isHolding = false;

    function debug(msg) { logDiv.innerText = msg; }

    function startHold(lang, from, to) {
        if (isHolding) return; // מונע כפל לחיצות
        isHolding = true;
        
        // איפוס סאונד קודם
        synth.cancel();
        
        curFrom = from; curTo = to;
        recognition.lang = lang;

        // ויזואליות
        const btn = from === 'he' ? document.getElementById('btn-he') : document.getElementById('btn-en');
        btn.classList.add('active');

        try {
            recognition.start();
            debug("מקשיב... שחרר כשסיימת");
        } catch (e) { console.log(e); }
    }

    function endHold() {
        if (!isHolding) return;
        isHolding = false;

        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        
        try {
            recognition.stop(); // פה קורה הקסם - העצירה הידנית שולחת את הטקסט לעיבוד
            debug("מעבד...");
        } catch (e) { console.log(e); }
    }

    recognition.onresult = async (event) => {
        const text = event.results[event.results.length - 1][0].transcript;
        debug("שמעתי: " + text);
        
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${curFrom}|${curTo}`);
            const data = await res.json();
            const trans = data.responseData.translatedText;
            
            debug("תרגום: " + trans);
            const ut = new SpeechSynthesisUtterance(trans);
            ut.lang = (curTo === 'he') ? 'he-IL' : 'en-US';
            ut.rate = 0.9;
            synth.speak(ut);
        } catch (e) { debug("שגיאת תקשורת"); }
    };

    recognition.onerror = (e) => {
        if (e.error !== 'no-speech') debug("שגיאה: " + e.error);
    };
</script>
</body>
</html>
