<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מתרגם קולי דו-כיווני</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --secondary-color: #50E3C2;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* שורה עליונה - בחירת שפות */
        .top-bar {
            display: flex;
            height: 15%;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .lang-select-box {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            border-left: 1px solid #eee;
        }

        select {
            width: 90%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 1rem;
            outline: none;
        }

        /* אזורי הלחיצה */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .translate-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: background-color 0.3s;
            -webkit-user-select: none; /* מניעת בחירת טקסט בנייד */
            user-select: none;
            cursor: pointer;
        }

        #zone1 { background-color: #ffffff; border-bottom: 2px solid #eee; }
        #zone2 { background-color: #f9f9f9; }

        /* אפקט בזמן לחיצה */
        .translate-zone.active {
            background-color: #e1f5fe !important;
        }

        .status-text {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-color);
            margin-bottom: 10px;
        }

        .result-text {
            font-size: 1rem;
            color: #666;
            text-align: center;
            padding: 0 20px;
            min-height: 1.2em;
        }

        .mic-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <div class="lang-select-box">
            <select id="lang1">
                <option value="he-IL" selected>עברית</option>
                <option value="en-US">אנגלית</option>
                <option value="es-ES">ספרדית</option>
                <option value="fr-FR">צרפתית</option>
                <option value="ru-RU">רוסית</option>
            </select>
        </div>
        <div class="lang-select-box">
            <select id="lang2">
                <option value="en-US" selected>אנגלית</option>
                <option value="he-IL">עברית</option>
                <option value="es-ES">ספרדית</option>
                <option value="fr-FR">צרפתית</option>
                <option value="ru-RU">רוסית</option>
            </select>
        </div>
    </div>

    <div class="main-content">
        <div id="zone1" class="translate-zone" onmousedown="startRecording(1)" onmouseup="stopRecording(1)" ontouchstart="startRecording(1)" ontouchend="stopRecording(1)">
            <div class="mic-icon">🎙️</div>
            <div class="status-text" id="status1">לחץ והחזק לדבר</div>
            <div class="result-text" id="result1"></div>
        </div>

        <div id="zone2" class="translate-zone" onmousedown="startRecording(2)" onmouseup="stopRecording(2)" ontouchstart="startRecording(2)" ontouchend="stopRecording(2)">
            <div class="mic-icon">🎙️</div>
            <div class="status-text" id="status2">לחץ והחזק לדבר</div>
            <div class="result-text" id="result2"></div>
        </div>
    </div>
</div>

<script>
    // הגדרות זיהוי דיבור
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isRecording = false;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
    } else {
        alert("הדפדפן שלך לא תומך בזיהוי קולי. נסה להשתמש בכרום.");
    }

    // פונקציה לתחילת הקלטה
    function startRecording(zoneNum) {
        if (isRecording || !recognition) return;
        isRecording = true;

        const langSource = document.getElementById(zoneNum === 1 ? 'lang1' : 'lang2').value;
        recognition.lang = langSource;

        document.getElementById(`zone${zoneNum}`).classList.add('active');
        document.getElementById(`status${zoneNum}`).innerText = "מקשיב...";
        
        recognition.start();

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById(`result${zoneNum}`).innerText = transcript;
            processTranslation(transcript, zoneNum);
        };

        recognition.onerror = (event) => {
            console.error("שגיאת זיהוי:", event.error);
            stopRecording(zoneNum);
        };
    }

    // פונקציה לסיום הקלטה
    function stopRecording(zoneNum) {
        if (!isRecording) return;
        isRecording = false;
        
        document.getElementById(`zone${zoneNum}`).classList.remove('active');
        document.getElementById(`status${zoneNum}`).innerText = "לחץ והחזק לדבר";
        
        setTimeout(() => recognition.stop(), 500); // השהייה קלה לסיום קליטת משפט
    }

    // לוגיקת התרגום והדיבור
    async function processTranslation(text, fromZone) {
        const lang1 = document.getElementById('lang1').value;
        const lang2 = document.getElementById('lang2').value;

        const sourceLang = (fromZone === 1) ? lang1 : lang2;
        const targetLang = (fromZone === 1) ? lang2 : lang1;
        const targetResultId = (fromZone === 1) ? 'result2' : 'result1';

        try {
            // שימוש ב-API חינמי לצורך ההדגמה (MyMemory)
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${sourceLang.split('-')[0]}|${targetLang.split('-')[0]}`);
            const data = await response.json();
            const translatedText = data.responseData.translatedText;

            // הצגת התרגום באיזור הנגדי
            document.getElementById(targetResultId).innerText = translatedText;

            // הקראת התרגום
            speak(translatedText, targetLang);
        } catch (error) {
            console.error("שגיאה בתרגום:", error);
        }
    }

    // פונקציית הקראת טקסט (TTS)
    function speak(text, langCode) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = langCode;
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
